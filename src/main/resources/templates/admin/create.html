<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <title>Aggiungi Film</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>

<body class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card shadow">
                <div class="card-header bg-primary text-white">
                    <h2 class="mb-0">Nuovo Film</h2>
                </div>
                <div class="card-body">
                    <form th:action="@{/admin/films/store}" th:object="${film}" method="post">

                        <div class="mb-3">
                            <label class="form-label">Titolo</label>
                            <input type="text" th:field="*{title}" class="form-control" required
                                placeholder="Inserisci il titolo...">
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Regista</label>
                            <input type="text" th:field="*{director}" class="form-control" required>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Anno di uscita</label>
                            <input type="number" th:field="*{releaseYear}" class="form-control" required min="1895">
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Descrizione / Trama</label>
                            <textarea th:field="*{description}" class="form-control" rows="4"></textarea>
                        </div>

                        <div class="d-flex justify-content-between">
                            <a th:href="@{/admin/films}" class="btn btn-secondary">Annulla</a>
                            <button type="submit" class="btn btn-success">Salva Film</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</body>

</html>
