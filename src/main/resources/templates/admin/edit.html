<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>Modifica Film</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="container mt-5">
    <div class="card shadow p-4">
        <h1>Modifica: <span th:text="${film.title}"></span></h1>

        <form th:action="@{/admin/films/update/{id}(id=${film.id})}" th:object="${film}" method="POST" class="mt-4">
            <div class="mb-3">
                <label for="title" class="form-label">Titolo</label>
                <input type="text" class="form-control" id="title" th:field="*{title}">
                <div th:if="${#fields.hasErrors('title')}" th:errors="*{title}" class="text-danger"></div>
            </div>

            <div class="mb-3">
                <label for="description" class="form-label">Descrizione</label>
                <textarea class="form-control" id="description" th:field="*{description}" rows="5"></textarea>
            </div>

            <div class="mt-4">
                <button type="submit" class="btn btn-primary">Salva Modifiche</button>
                <a th:href="@{/admin/films}" class="btn btn-secondary">Torna indietro</a>
            </div>
        </form>
    </div>
</body>

</html>
