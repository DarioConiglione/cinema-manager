<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>Backoffice - Lista Film</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">
    <nav class="navbar navbar-dark bg-dark mb-4">
        <div class="container">
            <span class="navbar-brand">Cinema Manager Admin</span>
        </div>
    </nav>

    <main class="container">
        <div class="card shadow p-4">
            <div class="d-flex justify-content-between align-items-center mb-3">
                <h2>Catalogo Film</h2>
                <a th:href="@{/admin/films/create}" class="btn btn-success">+ Nuovo Film</a>
            </div>

            <table class="table table-hover">
                <thead class="table-dark">
                    <tr>
                        <th>ID</th>
                        <th>Titolo</th>
                        <th>Recensioni</th>
                        <th class="text-center">Azioni</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="film : ${films}">
                        <td th:text="${film.id}"></td>
                        <td>
                            <strong th:text="${film.title}"></strong>
                        </td>
                        <td th:text="${film.reviews.size()}">0</td>
                        <td class="text-center">
                            <a th:href="@{/admin/films/show/{id}(id=${film.id})}"
                                class="btn btn-sm btn-info text-white">Dettagli</a>
                            <a th:href="@{/admin/films/edit/{id}(id=${film.id})}"
                                class="btn btn-sm btn-warning">Modifica</a>
                            <a th:href="@{/admin/films/delete/{id}(id=${film.id})}" class="btn btn-sm btn-danger"
                                onclick="return confirm('Sei sicuro di voler eliminare questo film?')">Elimina</a>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </main>
</body>

</html>
