<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <title>Backoffice Cinema</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>

<body class="container mt-5">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h1>Gestione Film</h1>
        <a th:href="@{/admin/films/create}" class="btn btn-primary">Aggiungi Film</a>
    </div>

    <table class="table table-striped">
        <thead>
            <tr>
                <th>ID</th>
                <th>Titolo</th>
                <th>Regista</th>
                <th>Anno</th>
                <th>Azioni</th>
            </tr>
        </thead>
        <tbody>
            <tr th:each="film : ${films}">
                <td th:text="${film.id}"></td>
                <td th:text="${film.title}"></td>
                <td th:text="${film.director}"></td>
                <td th:text="${film.releaseYear}"></td>
                <td>
                    <form th:action="@{/admin/films/delete/{id}(id=${film.id})}" method="post">
                        <button type="submit" class="btn btn-danger btn-sm"
                            onclick="return confirm('Sei sicuro?')">Elimina</button>
                    </form>
                </td>
            </tr>
        </tbody>
    </table>
</body>

</html>
