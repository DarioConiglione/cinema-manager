<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>Dettagli Film</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="container mt-5">
    <div class="card shadow p-4 mb-4">
        <h1 th:text="${film.title}"></h1>
        <hr>
        <p class="lead" th:text="${film.description}"></p>
        <a th:href="@{/admin/films}" class="btn btn-secondary">Torna alla lista</a>
    </div>

    <div class="card shadow p-4">
        <h3>Recensioni Utenti</h3>
        <div th:if="${film.reviews.empty}" class="alert alert-info">
            Non ci sono ancora recensioni per questo film.
        </div>
        <ul class="list-group list-group-flush">
            <li class="list-group-item" th:each="review : ${film.reviews}">
                <strong th:text="${review.author}">Autore</strong>:
                <span th:text="${review.content}">Contenuto della recensione</span>
            </li>
        </ul>
    </div>
</body>

</html>
