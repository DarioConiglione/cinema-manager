<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>Dettagli Film</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="container mt-5">
    <div class="card shadow p-4 mb-4">
        <h1 th:text="${film.title}"></h1>
        <hr>
        <p class="lead" th:text="${film.description}"></p>
        <a th:href="@{/admin/films}" class="btn btn-secondary">Torna alla lista</a>
    </div>

    <div class="card shadow p-4">
        <div class="d-flex justify-content-between align-items-center mb-3">
            <h3>Recensioni Utenti</h3>
            <a th:href="@{/admin/films/show/{filmId}/reviews/create(filmId=${film.id})}" class="btn btn-success">
                Aggiungi Recensione</a>
        </div>
        <div th:if="${film.reviews.empty}" class="alert alert-info">
            Non ci sono ancora recensioni per questo film.
        </div>
        <ul class="list-group list-group-flush">
            <li class="list-group-item d-flex justify-content-between align-items-center"
                th:each="review : ${film.reviews}">
                <div>
                    <strong th:text="${review.author}">Autore</strong>:
                    <span th:text="${review.content}">Contenuto</span>
                </div>

                <div>
                    <!-- Tasto per modificare la singola recensione -->
                    <a th:href="@{/admin/films/reviews/edit/{id}(id=${review.id})}"
                        class="btn btn-sm btn-primary me-2">Modifica</a>
                    <!-- Tasto per eliminare la singola recensione -->
                    <a th:href="@{/admin/films/reviews/delete/{id}(id=${review.id})}" class="btn btn-sm btn-danger"
                        onclick="return confirm('Sei sicuro di voler eliminare questa recensione?')">Elimina</a>
                </div>
            </li>
        </ul>
    </div>
</body>

</html>
